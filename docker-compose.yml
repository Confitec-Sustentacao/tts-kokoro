services:
  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:v0.5.0
    ports:
      - "8880:8880"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8880/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      - ONNX_NUM_THREADS=2
      - API_LOG_LEVEL=INFO
